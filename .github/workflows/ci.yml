# Continuous Integration: the backstop that runs the SAME checks as local
# pre-commit, plus the test suite, on every push and pull request.

name: CI

on:
  push:
  pull_request:

jobs:
  pre-commit:
    name: Lint & type-check (pre-commit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      # Runs every hook (incl. mypy) against all files.
      - uses: pre-commit/action@v3.0.1

  tests:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - run: pip install -r requirements.txt
      - run: pytest
